<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love of Dish | Premium Recipes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <!-- Ensure your logo is in images/logo.png -->
            <img src="images/logo.png" alt="Love of Dish Logo" class="main-logo" onerror="this.style.display='none'">
            <div class="logo-text">LOVE OF DISH</div>
        </div>
        <p>Experience the art of taste</p>
    </header>

    <main id="dish-container" class="container">
        <p class="loading">Loading our special dishes...</p>
    </main>

    <!-- Contact Pop-up Modal -->
    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Contact Us</h2>
            <p>Order your favorite dish or ask any questions!</p>
            <div class="contact-info">
                <p>📞 <strong>Phone:</strong> +94 77 545 3117</p>
                <p>📍 <strong>Location:</strong> Kelaniya, Sri Lanka</p>
            </div>
            <a id="whatsapp-link" href="#" target="_blank" class="whatsapp-btn">Message on WhatsApp</a>
        </div>
    </div>

    <!-- Floating Contact Buttons -->
    <div class="floating-contact">
        <a href="tel:+94 77 545 3117" class="float-btn call-float" title="Call Us">
            <span>📞</span>
        </a>
        <a href="https://wa.me/94 72 969 8328" class="float-btn wa-float" title="WhatsApp Us">
            <span>💬</span>
        </a>
    </div>

    <footer>
        <p>&copy; 2026 Love of Dish. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
