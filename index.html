<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love of Dish | Premium Recipes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
    <div id="contact-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-title">Contact Us</h2>
        <p>Order your favorite dish or ask any questions!</p>
        <div class="contact-info">
            <p>📞 <strong>Phone:</strong> +94 72 969 8328</p> <p>📍 <strong>Location:</strong> Kelaniya, Sri Lanka</p>
        </div>
        <a id="whatsapp-link" href="#" target="_blank" class="whatsapp-btn">Message on WhatsApp</a>
    </div>
</div>
<body>
    <header>
        <div class="logo">LOVE OF DISH</div>
        <p>Experience the art of taste</p>
    </header>

    <main id="dish-container" class="container">
        <p class="loading">Please login to Admin and add your first dish to see it here.</p>
    </main>

    <footer>
        <p>&copy; 2026 Love of Dish. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
